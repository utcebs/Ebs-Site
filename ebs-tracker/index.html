<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EBS Tracker" />
  <meta name="theme-color" content="#080d1a" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="apple-touch-startup-image" href="icon-512.png" />
  <title>EBS Tracker — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .rpg-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .rpg-particles span {
      position: absolute; font-size: 20px; opacity: 0.06;
      animation: float linear infinite;
    }
    @keyframes float { 0%{transform:translateY(100vh) rotate(0deg);opacity:0} 10%{opacity:.06} 90%{opacity:.06} 100%{transform:translateY(-100px) rotate(360deg);opacity:0} }
    .auto-login-banner {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #6ee7b7;
      text-align: center;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
<script>document.addEventListener("DOMContentLoaded",()=>{if(typeof initTheme==="function"){initTheme();injectThemeToggle();}});</script>
  <div class="login-page">
    <div class="rpg-particles" id="particles"></div>

    <div class="login-box fade-in">
      <div class="login-logo">
        <img src="logo.png" alt="EBS Tracker" class="logo-dark" style="height:52px;mix-blend-mode:screen;margin-bottom:10px;" /><img src="logo-light.png" alt="EBS Tracker" class="logo-light" style="height:52px;margin-bottom:10px;display:none;" />
        <h1>EBS Tracker</h1>
        <p>Your office quest begins here</p>
      </div>

      <div class="auto-login-banner" id="autoLoginBanner">
        🔄 Detecting existing session…
      </div>

      <div class="login-error" id="loginError"></div>

      <div class="form-group">
        <label class="form-label" for="emailInput">Email</label>
        <input type="email" id="emailInput" class="form-control" placeholder="Enter your email" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-lg" id="loginBtn" style="width:100%; justify-content:center; margin-top:8px;">
        <span>⚔️</span> Enter the Arena
      </button>

      <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-3);">
        Powered by Supabase · v2.0
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ── Auto-login: check if already authenticated (via EBS Tracker or Project Website) ──
    (async () => {
      const banner = document.getElementById('autoLoginBanner');
      banner.style.display = 'block';

      const synced = await syncSessionFromSupabase();
      if (synced) {
        // Session found (either from this app or from project website admin login)
        banner.textContent = `✅ Welcome back, ${synced.fullName}! Redirecting…`;
        setTimeout(() => {
          window.location.href = synced.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 600);
        return;
      }

      // No session — show login form normally
      banner.style.display = 'none';
    })();

    // ── Floating particles ──────────────────────────────────────
    const emojis = ['⚔️','🛡️','⚡','🔮','🌟','👑','🏹','🎯','🔥','💯'];
    const container = document.getElementById('particles');
    for (let i = 0; i < 15; i++) {
      const span = document.createElement('span');
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + 'vw';
      span.style.animationDuration = (8 + Math.random() * 14) + 's';
      span.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(span);
    }

    // ── Login handler ───────────────────────────────────────────
    const loginBtn = document.getElementById('loginBtn');
    const errEl    = document.getElementById('loginError');

    async function doLogin() {
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.classList.add('show');
        return;
      }
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Authenticating…';
      errEl.classList.remove('show');

      const result = await login(email, password);
      if (result.success) {
        loginBtn.innerHTML = '✅ Welcome back!';
        setTimeout(() => {
          window.location.href = result.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 600);
      } else {
        errEl.textContent = result.error;
        errEl.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>⚔️</span> Enter the Arena';
      }
    }

    loginBtn.addEventListener('click', doLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
